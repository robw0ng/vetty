name: release

# Build the VSIX + the JetBrains plugin zip and attach both to a GitHub Release whenever a v* tag
# is pushed. Flow: bump "version" in package.json → commit → `git tag v0.0.3 && git push --tags`.
on:
  push:
    tags: ['v*']
  workflow_dispatch: {} # allow manual runs from the Actions tab too

permissions:
  contents: write # needed to create the release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Smoke test
        run: npm test

      - name: Package VSIX
        run: |
          mkdir -p dist
          VERSION=$(node -p "require('./package.json').version")
          npx --yes @vscode/vsce package -o "dist/vetty-$VERSION.vsix"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Build JetBrains plugin
        run: |
          gradle -p jetbrains buildPlugin --console=plain
          cp jetbrains/build/distributions/*.zip dist/

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/') # only release on tag pushes; manual runs just build+test
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.vsix
            dist/*.zip
          generate_release_notes: true
